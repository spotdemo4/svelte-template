name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: write
      packages: write
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@8cfbe9e5d4eef03c557a70763c90af7ff4aafe67 # v1.46.0
        with:
          fetch_depth: 0
          shell: release

      - name: Release to GitHub
        run: flake-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES: |
            appimages.x86_64-linux.default.aarch64-unknown-linux-gnu
            appimages.x86_64-linux.default.armv7l-unknown-linux-gnueabihf
            appimages.x86_64-linux.default.x86_64-unknown-linux-gnu
            images.x86_64-linux.default.aarch64-unknown-linux-gnu
            images.x86_64-linux.default.armv7l-unknown-linux-gnueabihf
            images.x86_64-linux.default.x86_64-unknown-linux-gnu

      - name: Release to FlakeHub
        uses: DeterminateSystems/flakehub-push@71f57208810a5d299fc6545350981de98fdbc860 # v6
        with:
          visibility: public

      - name: Release to npm
        run: npm publish --access public
